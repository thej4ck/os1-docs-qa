services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - app-data:/app/data
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}

volumes:
  app-data:    # Persists data/app.db across deploys
  caddy-data:  # Persists SSL certificates
  caddy-config:
