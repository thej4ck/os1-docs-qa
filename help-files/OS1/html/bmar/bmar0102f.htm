<p style="font-family: Verdana, Arial; font-size: 12pt; font-weight: bold;">Storia trasferimenti</p>
<p>La tabella, che non è modificabile riporta le informazioni relative ad ogni trasferimento effettuato.</p>
<p style="text-align: center;"><img src="images/bmar0102f_01.png" alt="" style=" border:none; width:100%; max-width:397px;" border="0" /></p>
<p>&#160;</p>
<p>Vengono visualizzati, per ogni trasferimento, il contatore, la data, l'ora, l'esito <span style="font-style: italic;">OK</span> oppure <span style="font-style: italic;">Errato</span> ed eventuali annotazioni.</p>
