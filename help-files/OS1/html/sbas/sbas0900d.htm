<p style="font-family: Verdana, sans-serif; font-size: 10pt; text-align: justify; margin-top: 6pt; margin-bottom: 6pt;">Apponendo la spunta sull'apposita casella è possibile effettuare anche il ricalcolo dei singoli importi di rigo.</p>
