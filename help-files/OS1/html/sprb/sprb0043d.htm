<p style="margin-top: 1.5pt; margin-bottom: 1.5pt; margin-left: 0px;">Il 
 programma attiva la stampa dei buoni di prelievo, sulla base dei parametri

 specificare di effettuare la stampa dei riferimenti agli ODL per cui è 
 stato generato il buono, se generato da ODL.</p>
