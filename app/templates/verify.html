{% extends "base.html" %}
{% block title %}Verifica codice — OS1 Docs{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                </svg>
            </div>
            <h1>Controlla la tua email</h1>
            <p>Abbiamo inviato un codice a 6 cifre a <strong>{{ email }}</strong></p>
        </div>

        {% if error %}
        <div class="alert-error" role="alert">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/verify">
            <input type="hidden" name="email" value="{{ email }}">
            <div class="form-group">
                <label for="code">Codice OTP</label>
                <input type="text" id="code" name="code" class="form-input form-input-otp"
                       placeholder="000000"
                       pattern="[0-9]{6}" maxlength="6" inputmode="numeric"
                       autocomplete="one-time-code" required autofocus>
            </div>
            <button type="submit" class="btn-primary btn-full">Verifica</button>
        </form>

        <div style="text-align: center; margin-top: var(--sp-5);">
            <p style="font-size: 0.8125rem; color: var(--c-text-tertiary); margin-bottom: var(--sp-3);">
                Il codice scade tra 5 minuti.
            </p>
            <a href="/login" style="font-size: 0.8125rem; font-weight: 500;">&larr; Torna al login</a>
        </div>
    </div>
</div>
{% endblock %}
