{% extends "base.html" %}
{% block title %}Verifica codice — OS1 Docs{% endblock %}

{% block content %}
<article style="max-width: 400px; margin: 4rem auto;">
    <header>
        <h2>Inserisci il codice</h2>
        <p>Abbiamo inviato un codice a 6 cifre a <strong>{{ email }}</strong></p>
    </header>
    {% if error %}
    <p style="color: var(--pico-del-color);">{{ error }}</p>
    {% endif %}
    <form method="post" action="/verify">
        <input type="hidden" name="email" value="{{ email }}">
        <label for="code">Codice OTP</label>
        <input type="text" id="code" name="code" placeholder="000000"
               pattern="[0-9]{6}" maxlength="6" inputmode="numeric"
               autocomplete="one-time-code" required autofocus
               style="text-align: center; font-size: 1.5rem; letter-spacing: 8px;">
        <button type="submit">Verifica</button>
    </form>
    <footer>
        <small><a href="/login">Torna al login</a></small>
    </footer>
</article>
{% endblock %}
