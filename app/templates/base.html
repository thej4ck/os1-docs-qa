<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}OS1 Docs{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        :root {
            --pico-font-size: 16px;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        main {
            flex: 1;
        }
        .brand {
            font-weight: 700;
            font-size: 1.2rem;
            text-decoration: none;
        }
        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 80px);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 0;
        }
        .msg {
            margin-bottom: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            max-width: 85%;
            line-height: 1.5;
        }
        .msg-user {
            background: var(--pico-primary-background);
            color: var(--pico-primary-inverse);
            margin-left: auto;
            text-align: right;
        }
        .msg-assistant {
            background: var(--pico-secondary-background);
            margin-right: auto;
        }
        .msg-assistant p { margin: 0.3em 0; }
        .sources {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid var(--pico-muted-border-color);
        }
        .sources summary { cursor: pointer; }
        .chat-input {
            padding: 1rem 0;
            border-top: 1px solid var(--pico-muted-border-color);
        }
        .chat-input form {
            display: flex;
            gap: 0.5rem;
            margin: 0;
        }
        .chat-input input[type="text"] {
            flex: 1;
            margin: 0;
        }
        .chat-input button {
            margin: 0;
            white-space: nowrap;
        }
        .streaming-cursor::after {
            content: "▊";
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
        .suggestions {
            padding: 1rem;
            background: var(--pico-card-background-color);
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .suggestions h4 { margin: 0 0 0.5rem; font-size: 0.95rem; }
        .suggestions ul { margin: 0; padding-left: 1.2rem; }
        .suggestions li { font-size: 0.9rem; margin-bottom: 0.3rem; }
        .suggestion-link {
            cursor: pointer;
            color: var(--pico-primary);
            text-decoration: underline;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="container-fluid">
        <ul>
            <li><a href="/chat" class="brand">OS1 Docs</a></li>
        </ul>
        <ul>
            {% block nav_right %}{% endblock %}
        </ul>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
